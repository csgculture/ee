<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>몰입한줄</title>
<meta name="theme-color" content="#F0F1F5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#17181D" media="(prefers-color-scheme: dark)" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>" />
<meta name="description" content="당신을 위한 오늘의 한 줄이 도착했어요" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    /* 창신 브랜드 컬러 (Color Shades 기준) */
    --navy-900:#0F005F;
    --navy-700:#1E1473;
    --blue-500:#4B50F0;
    --blue-400:#6E78F5;
    --blue-300:#8282FF;
    --blue-100:#CDD7FF;
    /* 라이트 테마 */
    --bg:#F2F4FB;
    --paper:#FBFCFF;
    --ink:#1E1473;
    --ink-soft:#7D82A6;
    --rule:rgba(30,20,115,.15);
    --frame:rgba(30,20,115,.2);
    --accent:#4B50F0;         /* JS가 오늘의 색 / 사용자 선택으로 교체 */
    --row:46px;
  }
  [data-theme="dark"]{
    --bg:#131126;
    --paper:#131126;
    --ink:#E8EAFB;
    --ink-soft:#8B90B5;
    --rule:rgba(232,234,251,.2);
    --frame:rgba(205,215,255,.75);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;overflow-x:hidden}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:0 18px calc(40px + env(safe-area-inset-bottom, 0px));
    transition:background .3s, color .3s;
  }
  .view{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:stretch}
  [hidden]{display:none !important}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}

  /* =========================================================
     표지
     ========================================================= */
  .cover-wrap{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:26px 0}
  .cover{
    border:1px solid var(--frame);background:var(--paper);
    min-height:560px;min-height:min(80vh,660px);
    display:flex;flex-direction:column;
    padding:26px 26px 24px;position:relative;
    transform-origin:left center;
  }
  .cover.enter{animation:coverIn .6s cubic-bezier(.22,.8,.3,1)}
  .cover.leave{animation:coverOut .55s cubic-bezier(.5,0,.75,.4) forwards}
  @keyframes coverIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes coverOut{to{opacity:0;transform:perspective(1100px) rotateY(-15deg) translateX(-40px)}}
  .cover-head{display:flex;justify-content:space-between;align-items:center}
  .cover-brand{font-weight:700;font-size:1rem;letter-spacing:-.01em}
  .logo-slot{display:flex;justify-content:center;margin-top:22px}
  .logo-slot img{height:40px}
  .logo-slot .logo-light{display:block}
  .logo-slot .logo-dark{display:none}
  [data-theme="dark"] .logo-slot .logo-light{display:none}
  [data-theme="dark"] .logo-slot .logo-dark{display:block}
  .cover-year{font-weight:400;letter-spacing:.14em;font-size:.85rem;color:var(--ink-soft)}
  .cover-center{margin:auto 0;text-align:left}
  .cover-date{font-weight:400;font-size:.95rem;color:var(--ink-soft);margin-bottom:18px}
  .cover-msg{
    font-size:2.4rem;font-size:clamp(2.35rem, 11.5vw, 3.15rem);
    font-weight:800;line-height:1.42;letter-spacing:-.02em;
    color:var(--ink);word-break:keep-all;
  }
  .msg-line{display:block;opacity:0;transform:translateY(16px)}
  .cover.enter .msg-line{animation:msgUp .65s cubic-bezier(.22,.8,.3,1) forwards}
  .cover.enter .msg-line:nth-child(1){animation-delay:.25s}
  .cover.enter .msg-line:nth-child(2){animation-delay:.45s}
  .cover.enter .msg-line:nth-child(3){animation-delay:.65s}
  @keyframes msgUp{to{opacity:1;transform:none}}
  .msg-emoji{display:inline-block;margin-left:10px;opacity:0;transform:scale(.3) rotate(-12deg)}
  .cover.enter .msg-emoji{animation:emojiPop .5s cubic-bezier(.34,1.56,.64,1) 1.15s forwards}
  @keyframes emojiPop{to{opacity:1;transform:scale(1) rotate(0)}}
  .cover-cta{
    border:1px solid var(--frame);
    background:#6E78F5;color:#fff;
    font-size:.95rem;font-weight:400;letter-spacing:-.01em;
    padding:16px 0;width:100%;
    transition:opacity .15s, transform .1s;
  }
  .cover-cta:active{transform:scale(.985)}


  /* =========================================================
     오늘의 몰입 — 일력 시트
     ========================================================= */
  #viewMain.view-in{animation:fadeIn .45s ease}
  #viewMain.fade-out{animation:fadeOut .25s ease forwards}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeOut{to{opacity:0}}

  .sheet{
    border:1px solid var(--frame);
    background:linear-gradient(var(--sheet-tint,transparent),var(--sheet-tint,transparent)),var(--paper);
    min-height:560px;min-height:min(80vh,660px);
    display:flex;flex-direction:column;
    padding:26px 26px 24px;
    transform-origin:right center;
  }
  .head-right{display:flex;align-items:center}
  .head-right>*+*{margin-left:8px}
  .head-right .icon-btn{padding:4px}
  .head-right .icon-btn svg{width:19px;height:19px;stroke:var(--ink);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
  .quote-label{
    margin-top:26px;text-align:center;
    font-family:"Gaegu",cursive;font-size:1.2rem;font-weight:400;letter-spacing:0;color:var(--accent);
  }
  .sheet-date{margin:4px 0 6px;text-align:center;font-weight:400;font-size:.95rem;color:var(--ink)}
  .author-line{
    font-size:calc(.78rem * var(--fs,1));color:var(--ink-soft);font-weight:400;
    line-height:var(--row);
  }
  .author-line::before{content:"- "}
  .author-line::after{content:" -"}
  .view-in .sheet{opacity:0;animation:pageIn .7s cubic-bezier(.22,.8,.3,1) .18s forwards}
  @keyframes pageIn{
    from{opacity:0;transform:perspective(1100px) rotateY(11deg) translateX(44px)}
    to{opacity:1;transform:none}
  }

  .rows{
    flex:1;min-height:calc(var(--row) * 6);
    padding:0 8px;margin-top:8px;
    background:repeating-linear-gradient(to bottom,
      transparent 0 calc(var(--row) - 1px),
      var(--rule) calc(var(--row) - 1px) var(--row));
    display:flex;flex-direction:column;justify-content:flex-start;text-align:center;
  }
  .q-ko{
    font-size:calc(1.06rem * var(--fs,1));font-weight:700;line-height:var(--row);
    word-break:keep-all;overflow-wrap:break-word;letter-spacing:-.01em;
  }
  .q-en{
    font-size:calc(.8rem * var(--fs,1));font-style:italic;font-weight:400;
    line-height:var(--row);color:var(--ink-soft);overflow-wrap:break-word;
  }

  /* 메모 박스 */
  .memo-box{margin-top:14px;border:1px solid var(--frame);background:var(--paper);padding:16px 18px;display:none}
  .memo-box.open{display:block}
  .memo-box label{font-size:.78rem;font-weight:800;letter-spacing:.06em;color:var(--ink-soft)}
  .memo-box textarea{
    width:100%;margin-top:10px;border:none;background:none;resize:none;
    font-family:inherit;font-size:1rem;line-height:1.6;color:var(--ink);
    min-height:74px;outline:none;
    background:repeating-linear-gradient(to bottom, transparent 0 27px, var(--rule) 27px 28px);
  }
  .memo-actions{display:flex;justify-content:flex-end;margin-top:8px}
  .memo-actions button+button{margin-left:14px}
  .memo-actions button{font-size:.82rem;font-weight:700;color:var(--ink-soft)}
  .memo-actions .save{color:var(--accent)}

  /* 하단 아이콘 바 */
  .tool{
    display:flex;flex-direction:column;align-items:center;
    padding:8px 10px;position:relative;
  }
  .tool svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .tool.on svg{stroke:var(--accent);fill:var(--accent)}
  .tool .dot{
    position:absolute;top:6px;right:8px;width:6px;height:6px;border-radius:50%;
    background:var(--accent);display:none;
  }
  .tool.has .dot{display:block}


  /* =========================================================
     설정 모달
     ========================================================= */
  .modal-bg{
    position:fixed;inset:0;background:rgba(20,21,28,.45);
    display:none;align-items:flex-end;justify-content:center;z-index:60;
  }
  .modal-bg.open{display:flex}
  .modal{
    width:100%;max-width:460px;background:var(--paper);color:var(--ink);
    border-top:1px solid var(--frame);
    padding:20px 22px 30px;
  }
  .modal h3{font-size:.95rem;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .set-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 0;border-bottom:1px solid var(--rule);
  }
  .set-row:last-child{border-bottom:none}
  .set-label{font-size:.86rem;font-weight:700}
  .seg{display:flex}
  .seg button+button{margin-left:6px}
  .seg button{
    border:1px solid var(--rule);color:var(--ink-soft);
    font-size:.78rem;font-weight:700;padding:7px 12px;
  }
  .seg button.on{border-color:var(--frame);color:var(--ink)}
  .swatches{display:flex;flex-wrap:wrap;justify-content:flex-end;max-width:230px}
  .swatches .sw{margin:3px 0 3px 8px}
  .sw{
    width:26px;height:26px;border-radius:50%;border:1px solid var(--rule);
    position:relative;flex:none;
  }
  .sw.on::after{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:.72rem;font-weight:800;text-shadow:0 0 3px rgba(0,0,0,.4);
  }
  .sw.auto{
    background:conic-gradient(#4B50F0,#6E78F5,#8282FF,#008CBE,#00AADC,#00C8F5,#4B50F0);
  }

  .foot-line{
    margin-top:auto;padding-top:20px;text-align:center;
    font-family:"Gaegu",cursive;font-size:1.05rem;font-weight:400;letter-spacing:0;color:var(--ink-soft);
  }
  .toolbar{display:flex;justify-content:center;margin-top:14px;padding:0}
  .toolbar .tool{margin:0 13px}
  .likes-list{max-height:56vh;overflow-y:auto;margin-top:4px}
  .like-item{padding:15px 2px 13px;border-bottom:1px solid var(--rule)}
  .like-item:last-child{border-bottom:none}
  .like-item .lq{font-size:.9rem;line-height:1.55;word-break:keep-all}
  .like-item .len{font-size:.72rem;font-style:italic;color:var(--ink-soft);margin-top:4px;line-height:1.4}
  .like-item .lmeta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .like-item .lmeta span{font-size:.74rem;color:var(--ink-soft)}
  .like-item .unlike svg{width:16px;height:16px;stroke:var(--accent);fill:var(--accent);stroke-width:1.8}
  .likes-empty{padding:34px 0;text-align:center;font-size:.85rem;color:var(--ink-soft);line-height:1.6}
  .toast{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:var(--bg);font-size:.82rem;font-weight:700;
    padding:11px 20px;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;z-index:80;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){
    .msg-line,.cover.enter .msg-line,.msg-emoji,.cover.enter .msg-emoji{
      animation:none !important;opacity:1 !important;transform:none !important;
    }
    .cover.enter{animation:fadeIn .35s ease}
    .cover.leave{animation:fadeOut .35s ease forwards}
    .view-in .sheet{animation:fadeIn .35s ease forwards;transform:none}
  }
</style>
</head>

<script>
/* ============================================================
   설정 — 관리 항목
   1) SHEET_CSV_URL : 구글 시트 '웹에 게시(CSV)' 주소.
      비워두면 내장 명언 사용. 형식: A열=명언, B열=출처, C열=영어(선택)
   3) ARCHIVE_START : '지난 문장'을 보여줄 시작일(서비스 오픈일)
   ============================================================ */
const SHEET_CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8lo74zwzAmriEptbaJeix6VDd-FFyWRSCpMJpv08HqLtF1cOEvLgWvejPCBnOZ6F63SWEM-b4wo-3/pub?gid=0&single=true&output=csv";
const LOGO_LIGHT     = "logo-navy.png";   /* 라이트 모드용 (네이비 로고) */
const LOGO_DARK      = "logo-white.png";  /* 다크 모드용 (화이트 로고) */
const ARCHIVE_START  = "2026-07-01";

/* 매일 순환하는 오늘의 색 — 창신 브랜드 Blue/Cyan 셰이드 (전 직원 동일) */
const DAY_COLORS = ["#4B50F0","#6E78F5","#8282FF","#00AADC","#00C8F5"];

/* 시트 연동 전용 — 내장 명언 없음 */
const FALLBACK_QUOTES = [];

/* ---------- 유틸 ---------- */
const $ = (id)=>document.getElementById(id);
const WDAYS_KO = ["일","월","화","수","목","금","토"];

const store = (()=> {
  let mem = {};
  const ok = (()=>{ try{ localStorage.setItem("_t","1"); localStorage.removeItem("_t"); return true; }catch(e){ return false; } })();
  return {
    get(k){ try{ return ok ? JSON.parse(localStorage.getItem(k)||"null") : (mem[k]!==undefined?mem[k]:null); }catch(e){ return mem[k]!==undefined?mem[k]:null; } },
    set(k,v){ try{ if(ok) localStorage.setItem(k,JSON.stringify(v)); else mem[k]=v; }catch(e){ mem[k]=v; } }
  };
})();

function kstToday(){ return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Seoul"}); }
function dayNumber(dateStr){
  const [y,m,d] = dateStr.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/86400000);
}
function parts(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  const w=new Date(Date.UTC(y,m-1,d)).getUTCDay();
  return {y,m,d,w};
}
function fmtKo(dateStr){
  const p=parts(dateStr);
  return `${p.y}년 ${p.m}월 ${p.d}일 ${WDAYS_KO[p.w]}요일`;
}
function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===","){ row.push(cur); cur=""; }
      else if(c==="\n"||c==="\r"){ if(cur!==""||row.length){row.push(cur);rows.push(row);row=[];cur="";} if(c==="\r"&&text[i+1]==="\n")i++; }
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- 상태 ---------- */
const today = kstToday();
let quotes = FALLBACK_QUOTES;
let settings = Object.assign({theme:"auto", accent:"auto", fontSize:1}, store.get("molip_settings")||{});

/* 시스템 다크모드 감지 */
const darkMq = window.matchMedia ? matchMedia("(prefers-color-scheme: dark)") : null;
function resolvedTheme(){
  if(settings.theme==="auto") return (darkMq && darkMq.matches) ? "dark" : "light";
  return settings.theme;
}
if(darkMq && darkMq.addEventListener){
  darkMq.addEventListener("change", ()=>{ if(settings.theme==="auto") applySettings(); });
}

function quoteFor(dateStr){
  const dn = dayNumber(dateStr);
  const idx = ((dn % quotes.length) + quotes.length) % quotes.length;
  const q = quotes[idx];
  return { text:q[0], author:q[1]||"작자 미상", en:q[2]||"" };
}
function colorFor(dateStr){
  const dn = dayNumber(dateStr);
  return DAY_COLORS[((dn % DAY_COLORS.length) + DAY_COLORS.length) % DAY_COLORS.length];
}
function accentColor(){
  return settings.accent === "auto" ? colorFor(today) : settings.accent;
}
function bookmarks(){ return store.get("molip_bookmarks") || []; }
function memos(){ return store.get("molip_memos") || {}; }
function isBookmarked(d){ return bookmarks().some(b=>b.date===d); }
function toggleBookmark(d){
  let list = bookmarks();
  if(isBookmarked(d)) list = list.filter(b=>b.date!==d);
  else { const q=quoteFor(d); list.push({date:d, text:q.text, author:q.author}); }
  store.set("molip_bookmarks", list);
  try{ navigator.vibrate && navigator.vibrate(8); }catch(e){}
}

/* ---------- 설정 적용 ---------- */
function applySettings(){
  document.documentElement.dataset.theme = resolvedTheme();
  document.documentElement.style.setProperty("--accent", accentColor());
  document.documentElement.style.setProperty("--fs", [0.9,1,1.14][settings.fontSize]);
  // 오늘의 색을 연하게 노트 배경에 입히기
  const hx = accentColor().replace("#","");
  const [tr,tg,tb] = [hx.slice(0,2),hx.slice(2,4),hx.slice(4,6)].map(v=>parseInt(v,16));
  const tint = resolvedTheme()==="dark" ? `rgba(${tr},${tg},${tb},.16)` : `rgba(${tr},${tg},${tb},.07)`;
  document.documentElement.style.setProperty("--sheet-tint", tint);
  // 세그먼트 표시
  document.querySelectorAll("#segTheme button").forEach(b=>b.classList.toggle("on", b.dataset.v===settings.theme));
  document.querySelectorAll("#segFont button").forEach(b=>b.classList.toggle("on", +b.dataset.v===settings.fontSize));
  document.querySelectorAll("#swatches .sw").forEach(b=>b.classList.toggle("on", b.dataset.v===String(settings.accent)));
  store.set("molip_settings", settings);
}

/* ---------- 데이터 로드 ---------- */
async function loadQuotes(){
  if(!SHEET_CSV_URL){ renderCover(); renderToday(); return; }
  var cached = store.get("molip_sheet_cache");
  if(cached && cached.rows && cached.rows.length > 0){
    quotes = cached.rows;
  }
  renderCover();
  renderToday();
  try{
    var needRefresh = !cached || cached.date !== today;
    if(needRefresh){
      var res = await fetch(SHEET_CSV_URL);
      var raw = (await res.text()).replace(/^\uFEFF/,"").trim();
      var rows = parseCSV(raw)
        .slice(1)
        .map(function(r){return [String(r[0]||"").trim(), String(r[1]||"").trim(), String(r[2]||"").trim()];})
        .filter(function(r){return r[0].length>0;});
      if(rows.length > 0){
        store.set("molip_sheet_cache", {date: today, rows: rows});
        if(quotes.length === 0 || cached === null || cached.date !== today){
          quotes = rows;
          renderToday();
        }
      }
    }
  }catch(e){}
}

/* ---------- 렌더: 표지 ---------- */
const EMOJIS = ["✨","📖","🌿","☕","💌","🍀","🌤️","🔖","🕯️","🌊"];
function setEmoji(){
  $("msgEmoji").textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
}
function renderCover(){
  setEmoji();
  const p = parts(today);
  $("coverYear").textContent = p.y;
  $("coverDate").textContent = `${p.m}월 ${p.d}일 ${WDAYS_KO[p.w]}요일`;
}

/* ---------- 렌더: 오늘의 몰입 ---------- */
function renderToday(){
  const p = parts(today);
  const q = quoteFor(today);
  $("vYear").textContent = p.y;
  $("sheetDate").textContent = `${p.m}월 ${p.d}일 ${WDAYS_KO[p.w]}요일`;
  $("quoteText").textContent = q.text;
  $("quoteEn").textContent = q.en;
  $("quoteEn").style.display = q.en ? "block" : "none";
  $("quoteAuthor").textContent = q.author;
  syncToday();
}
function syncToday(){
  const liked = isBookmarked(today);
  $("btnSave").classList.toggle("on", liked);
  $("btnSave").setAttribute("aria-pressed", liked);
  const hasMemo = !!(memos()[today]||"").trim();
  $("btnMemo").classList.toggle("has", hasMemo);
}

/* ---------- 화면 전환 ---------- */
let switching=false;
function show(id){
  ["viewCover","viewMain"].forEach(v=>$(v).hidden = v!==id);
  window.scrollTo(0,0);
}
$("btnEnter").onclick = ()=>{
  if(switching) return; switching=true;
  const c=$("coverCard");
  c.classList.remove("enter"); c.classList.add("leave");
  setTimeout(()=>{
    c.classList.remove("leave");
    show("viewMain");
    $("viewMain").classList.add("view-in");
    switching=false;
  },520);
};
function goHome(){
  if(switching) return; switching=true;
  $("viewMain").classList.add("fade-out");
  setTimeout(()=>{
    $("viewMain").classList.remove("view-in","fade-out");
    show("viewCover");
    const c=$("coverCard");
    c.classList.remove("enter"); void c.offsetWidth; c.classList.add("enter");
    switching=false;
  },240);
}
$("goHome").onclick = goHome;

/* 왼→오 스와이프: 몰입→표지, 아카이브→몰입 */
function addSwipe(el, fn){
  let sx=0, sy=0;
  el.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(dx>80 && Math.abs(dy)<70) fn();
  },{passive:true});
}
addSwipe($("viewMain"), goHome);

/* ---------- 토스트 ---------- */
let toastTimer;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ---------- 오늘 액션 ---------- */
$("btnSave").onclick = ()=>{
  toggleBookmark(today);
  syncToday();
  toast(isBookmarked(today) ? "보관함에 담았어요" : "보관함에서 뺐어요");
};
$("btnMemo").onclick = ()=>{
  const box=$("memoBox");
  const open=!box.classList.contains("open");
  box.classList.toggle("open", open);
  if(open){ $("memoInput").value = memos()[today]||""; $("memoInput").focus(); }
};
$("memoCancel").onclick = ()=> $("memoBox").classList.remove("open");
$("memoSave").onclick = ()=>{
  const ms = memos();
  const v = $("memoInput").value;
  if(v.trim()) ms[today]=v; else delete ms[today];
  store.set("molip_memos", ms);
  $("memoBox").classList.remove("open");
  syncToday();
  toast("메모를 저장했어요");
};

$("btnShare").onclick = async ()=>{
  const q = quoteFor(today);
  const text = `“${q.text}”` + (q.en ? `\n${q.en}` : "") + ` — ${q.author}\n\n몰입한줄 · ${fmtKo(today)}`;
  if(navigator.share){
    try{ await navigator.share({title:"몰입한줄 — 오늘의 몰입", text, url:location.href}); }catch(e){}
  }else{
    try{ await navigator.clipboard.writeText(text+"\n"+location.href); toast("문장을 복사했어요"); }
    catch(e){ toast("이 브라우저에서는 공유를 지원하지 않아요"); }
  }
};

/* ---------- 이미지 카드 (1080×1350, 일력 스타일) ---------- */
$("btnImage").onclick = async ()=>{
  try{ await document.fonts.ready; }catch(e){}
  const q = quoteFor(today), p = parts(today), ac = accentColor();
  const dark = resolvedTheme()==="dark";
  const BG   = dark ? "#131126" : "#FBFCFF";
  const INK  = dark ? "#E8EAFB" : "#1E1473";
  const SOFT = "#7D82A6";
  const RULE = dark ? "rgba(232,234,251,.2)" : "rgba(30,20,115,.13)";
  const hx = ac.replace("#","");
  const [tr,tg,tb] = [hx.slice(0,2),hx.slice(2,4),hx.slice(4,6)].map(v=>parseInt(v,16));
  const TINT = dark ? `rgba(${tr},${tg},${tb},.16)` : `rgba(${tr},${tg},${tb},.07)`;

  const W=1080, pad=80, inner=W-pad*2;
  const rowH=80;

  // 먼저 내용 줄 수 계산 (임시 캔버스)
  const tmp=document.createElement("canvas"); tmp.width=W; tmp.height=100;
  const tx=tmp.getContext("2d");
  if(!tx){ toast("이 브라우저에서는 이미지 저장을 지원하지 않아요"); return; }
  tx.font='700 44px "Pretendard Variable", Pretendard, sans-serif';
  const koLines = wrap(tx, q.text, inner-100);
  tx.font='italic 400 28px "Pretendard Variable", Pretendard, sans-serif';
  const enLines = q.en ? wrap(tx, q.en, inner-120) : [];
  const contentRows = koLines.length + (enLines.length ? enLines.length + 1 : 0) + 1.5;
  const totalRows = Math.max(Math.ceil(contentRows) + 1, 5);

  // 높이 자동 계산
  const headerH = 260;
  const rowsH = totalRows * rowH;
  const footerH = 260;
  const H = pad*2 + headerH + rowsH + footerH;

  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const x=cv.getContext("2d");

  // 배경 + 오늘의 색
  x.fillStyle=BG; x.fillRect(0,0,W,H);
  x.fillStyle=TINT; x.fillRect(0,0,W,H);
  x.strokeStyle = dark ? "rgba(232,234,251,.2)" : "rgba(30,20,115,.15)";
  x.lineWidth=2; x.strokeRect(pad,pad,inner,H-pad*2);

  // 상단: 몰입한줄 / 연도
  const topY=pad+70;
  x.textBaseline="alphabetic";
  x.fillStyle=INK; x.textAlign="left";
  x.font='700 36px "Pretendard Variable", Pretendard, sans-serif';
  x.fillText("몰입한줄", pad+36, topY);
  x.fillStyle=SOFT; x.textAlign="right";
  x.font='400 32px "Pretendard Variable", Pretendard, sans-serif';
  x.fillText(String(p.y), W-pad-36, topY);

  // 오늘의 몰입 + 날짜
  x.textAlign="center";
  x.fillStyle=ac;
  x.font='400 48px "Gaegu", cursive';
  x.fillText("오늘의 몰입", W/2, topY+100);
  x.fillStyle=INK;
  x.font='400 34px "Pretendard Variable", Pretendard, sans-serif';
  x.fillText(p.m+"월 "+p.d+"일 "+WDAYS_KO[p.w]+"요일", W/2, topY+154);

  // 괘선 (내용 줄 수만큼만)
  const rowsTop=topY+200;
  x.strokeStyle=RULE; x.lineWidth=1.5;
  for(let i=0;i<=totalRows;i++){
    x.beginPath(); x.moveTo(pad+36,rowsTop+i*rowH); x.lineTo(W-pad-36,rowsTop+i*rowH); x.stroke();
  }

  // 한글 명언
  x.fillStyle=INK; x.textAlign="center";
  x.font='700 44px "Pretendard Variable", Pretendard, sans-serif';
  let row=0;
  koLines.forEach(ln=>{ x.fillText(ln, W/2, rowsTop+row*rowH+rowH/2+16); row++; });

  // 영어 원문
  if(enLines.length){
    row += 0.3;
    x.fillStyle=SOFT;
    x.font='italic 400 28px "Pretendard Variable", Pretendard, sans-serif';
    enLines.forEach(ln=>{ x.fillText(ln, W/2, rowsTop+row*rowH+rowH/2+12); row++; });
  }

  // 출처
  row += 0.3;
  x.fillStyle=SOFT;
  x.font='400 28px "Pretendard Variable", Pretendard, sans-serif';
  x.fillText("- "+q.author+" -", W/2, rowsTop+row*rowH+rowH/2+12);

  // 하단: 응원 문구 + 로고
  x.fillStyle=SOFT; x.textAlign="center";
  x.font='400 36px "Gaegu", cursive';
  x.fillText("당신의 몰입과 성장을 응원합니다", W/2, H-pad-160);
  const logoEl = document.querySelector(dark ? ".logo-dark" : ".logo-light");
  if(logoEl && logoEl.complete){
    const lh=64, lw=logoEl.naturalWidth*(lh/logoEl.naturalHeight);
    try{ x.drawImage(logoEl, (W-lw)/2, H-pad-120, lw, lh); }catch(e){}
  }

  const a=document.createElement("a");
  a.download="몰입한줄_"+today+".png";
  a.href=cv.toDataURL("image/png");
  a.click();
  toast("이미지를 저장했어요");
};
function wrap(x,text,maxW){
  const words=text.split(" "), lines=[]; let cur="";
  for(const w of words){
    const t = cur ? cur+" "+w : w;
    if(x.measureText(t).width>maxW && cur){ lines.push(cur); cur=w; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}

/* ---------- 좋아요 보관함 ---------- */
function renderLikes(){
  const list = bookmarks().slice().reverse();
  const box = $("likesList");
  if(!list.length){
    box.innerHTML = `<div class="likes-empty">아직 담긴 문장이 없어요.<br/>마음에 남는 오늘의 문장에 하트를 눌러보세요.</div>`;
    return;
  }
  box.innerHTML = list.map(b=>{
    const q = quoteFor(b.date);
    const p = parts(b.date);
    return `<div class="like-item" data-date="${esc(b.date)}">
      <div class="lq">${esc(b.text)}</div>
      ${q.en ? `<div class="len">${esc(q.en)}</div>` : ""}
      <div class="lmeta">
        <span>- ${esc(b.author)} - · ${p.m}월 ${p.d}일</span>
        <button class="icon-btn unlike" aria-label="좋아요 해제">
          <svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        </button>
      </div>
    </div>`;
  }).join("");
  box.querySelectorAll(".unlike").forEach(btn=>{
    btn.onclick = ()=>{
      const d = btn.closest(".like-item").dataset.date;
      toggleBookmark(d);
      if(d===today) syncToday();
      renderLikes();
    };
  });
}
$("openLikes").onclick = ()=>{ renderLikes(); $("likesModal").classList.add("open"); };
$("closeLikes").onclick = ()=> $("likesModal").classList.remove("open");
$("likesModal").onclick = (e)=>{ if(e.target.id==="likesModal") $("likesModal").classList.remove("open"); };

/* ---------- 설정 UI ---------- */
function openSettings(){ $("settingsModal").classList.add("open"); }
$("openSettings").onclick = openSettings;
$("closeSettings").onclick = ()=> $("settingsModal").classList.remove("open");
$("settingsModal").onclick = (e)=>{ if(e.target.id==="settingsModal") $("settingsModal").classList.remove("open"); };

document.querySelectorAll("#segTheme button").forEach(b=>{
  b.onclick = ()=>{ settings.theme=b.dataset.v; applySettings(); };
});
document.querySelectorAll("#segFont button").forEach(b=>{
  b.onclick = ()=>{ settings.fontSize=+b.dataset.v; applySettings(); };
});
(function buildSwatches(){
  const box=$("swatches");
  const opts=[["auto","auto"]].concat(DAY_COLORS.map(c=>[c,c]));
  box.innerHTML = opts.map(([v])=>{
    if(v==="auto") return `<button class="sw auto" data-v="auto" aria-label="매일 자동"></button>`;
    return `<button class="sw" data-v="${v}" style="background:${v}" aria-label="색상"></button>`;
  }).join("");
  box.querySelectorAll(".sw").forEach(b=>{
    b.onclick=()=>{ settings.accent = b.dataset.v==="auto" ? "auto" : b.dataset.v; applySettings(); };
  });
})();

/* ---------- 시작 ---------- */
applySettings();
loadQuotes();
</script>
